spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:${MYSQLUSER}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD}}
stockwise.mail.admin-address=${ADMIN_EMAIL:${STOCKWISE_ADMIN_EMAIL:${MAIL_FROM:}}}
stockwise.forgot-password.cooldown-seconds=${FORGOT_PASSWORD_COOLDOWN_SECONDS:60}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

stockwise.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
