spring.application.name=Smart Invent
server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=framework
spring.profiles.default=${SPRING_PROFILES_DEFAULT:mysql}

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:stockwise_inventory}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:stockwise}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

stockwise.security.jwt.secret=${JWT_SECRET:${random.uuid}${random.uuid}}
stockwise.security.jwt.expires-in-minutes=${JWT_EXPIRES_IN_MINUTES:480}
stockwise.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080}
stockwise.verification.code-expires-minutes=${VERIFICATION_CODE_EXPIRES_MINUTES:10}
stockwise.verification.resend-cooldown-seconds=${VERIFICATION_RESEND_COOLDOWN_SECONDS:30}
stockwise.mail.enabled=${MAIL_ENABLED:false}
stockwise.mail.from=${MAIL_FROM:no-reply@smartinvent.local}
stockwise.mail.admin-address=${ADMIN_EMAIL:${STOCKWISE_ADMIN_EMAIL:${MAIL_FROM:}}}
stockwise.forgot-password.cooldown-seconds=${FORGOT_PASSWORD_COOLDOWN_SECONDS:60}
stockwise.seed.users.enabled=${STOCKWISE_SEED_USERS_ENABLED:false}
stockwise.seed.admin.name=${STOCKWISE_SEED_ADMIN_NAME:Smart Invent Admin}
stockwise.seed.admin.email=${STOCKWISE_SEED_ADMIN_EMAIL:}
stockwise.seed.admin.password=${STOCKWISE_SEED_ADMIN_PASSWORD:}
stockwise.seed.manager.name=${STOCKWISE_SEED_MANAGER_NAME:Operations Manager}
stockwise.seed.manager.email=${STOCKWISE_SEED_MANAGER_EMAIL:}
stockwise.seed.manager.password=${STOCKWISE_SEED_MANAGER_PASSWORD:}
stockwise.seed.viewer.name=${STOCKWISE_SEED_VIEWER_NAME:Inventory Viewer}
stockwise.seed.viewer.email=${STOCKWISE_SEED_VIEWER_EMAIL:}
stockwise.seed.viewer.password=${STOCKWISE_SEED_VIEWER_PASSWORD:}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
